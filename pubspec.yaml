name: mediamix
description: A cross-platform media app with live TV and browser.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 网络
  dio: ^5.4.0
  # 数据库
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  # 状态管理
  flutter_riverpod: ^2.4.0
  # 路由
  go_router: ^13.0.0
  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  # 文件
  path_provider: ^2.1.0
  path: ^1.8.0
  # 工具
  logger: ^2.0.0
  uuid: ^4.2.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  html: ^0.15.4
  # 媒体播放
  media_kit: ^1.1.0
  media_kit_video: ^1.2.0
  media_kit_libs_video: ^1.0.0
  # 本地存储
  shared_preferences: ^2.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.19.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icons/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
